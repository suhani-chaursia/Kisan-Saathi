<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌦 मौसम अलर्ट - किसान साथी</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Baloo+2:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --dark-green: #1b5e20;
      --medium-green: #2e7d32;
      --light-green: #43a047;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f1f8e9, #e8f5e9);
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .header {
      background: var(--dark-green);
      color: white;
      padding: 1rem;
    }
    .main-temp-card {
      background: linear-gradient(135deg, #4fc3f7, #29b6f6);
      color: white;
      border-radius: 20px;
    }
    .alert-box {
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .high-risk { background: linear-gradient(135deg, #c62828, #e53935); color: white; }
    .medium-risk { background: linear-gradient(135deg, #f57c00, #fb8c00); color: white; }
    .low-risk { background: linear-gradient(135deg, #2e7d32, #43a047); color: white; }
    .voice-btn {
      transition: all 0.3s ease;
    }
    .aqi-good { color: #2e7d32; }
    .aqi-moderate { color: #f57c00; }
    .aqi-poor { color: #c62828; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <a href="#" class="text-white me-3 fs-4">←</a>
      <h4 class="mb-0">🌦 मौसम अलर्ट - किसान साथी</h4>
    </div>
    <div id="offline-badge-small" class="badge bg-warning text-dark d-none">ऑफलाइन</div>
  </div>

  <div class="container mt-4">

    <!-- Current Weather -->
    <div class="main-temp-card p-4 text-center mb-4">
      <h5 id="locationText" class="mb-2">📍 छतरपुर, मध्य प्रदेश</h5>
      <h1 id="temperature" class="display-1 fw-bold">36°C</h1>
      <h5 id="weather-desc">लोड हो रहा है...</h5>
    </div>

    <!-- Main Alert -->
    <div id="mainAlert"></div>

    <!-- Voice Button -->
    <div class="text-center my-4">
      <button onclick="toggleSpeech()" id="voiceBtn" class="voice-btn btn btn-success btn-lg rounded-pill px-5 shadow">
        <i class="fas fa-volume-up me-2"></i>
        <span id="voice-btn-text">अलर्ट सुनें</span>
      </button>
    </div>

    <!-- Additional Info -->
    <div class="card p-4">
      <h6 class="fw-bold mb-3">आज की अन्य जानकारी</h6>
      <div class="row text-center g-3">
        <div class="col-2">
          <i class="fas fa-wind fa-2x text-info mb-2"></i>
          <p class="mb-0 small">हवा</p>
          <strong id="wind-speed">12 km/h</strong>
        </div>
        <div class="col-2">
          <i class="fas fa-cloud-rain fa-2x text-primary mb-2"></i>
          <p class="mb-0 small">बारिश</p>
          <strong id="rain-amount">5 mm</strong>
        </div>
        <div class="col-2">
          <i class="fas fa-sun fa-2x text-warning mb-2"></i>
          <p class="mb-0 small">अधिकतम</p>
          <strong id="max-temp">38°C</strong>
        </div>
        <div class="col-2">
          <i class="fas fa-droplet fa-2x text-info mb-2"></i>
          <p class="mb-0 small">नमी</p>
          <strong id="humidity">45%</strong>
        </div>
        <div class="col-2">
          <i class="fas fa-lungs fa-2x text-success mb-2"></i>
          <p class="mb-0 small">AQI</p>
          <strong id="aqi">42 (अच्छी)</strong>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentVoiceMessage = "";
    let isSpeaking = false;
    let lastWeatherData = null;

    const BACKEND_URL = "/api/weather/alert";   // Your Spring Boot endpoint

    function getWeatherDesc(code) {
      const map = { 0:"साफ आसमान ☀️", 1:"अधिकतर साफ 🌤", 2:"आंशिक बादल ⛅", 3:"बादल छाए हैं ☁️", 
                    45:"कोहरा 🌫", 61:"हल्की बारिश 🌧", 63:"मध्यम बारिश 🌧", 65:"तेज बारिश 🌧", 
                    80:"बौछारें 🌦", 95:"आंधी-तूफान ⛈" };
      return map[code] || "आंशिक बादल ⛅";
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'hi-IN';
      utterance.rate = 0.9;
      utterance.pitch = 1.05;
      
      utterance.onend = () => { isSpeaking = false; updateVoiceButton(); };
      window.speechSynthesis.speak(utterance);
      isSpeaking = true;
      updateVoiceButton();
    }

    function toggleSpeech() {
      if (isSpeaking) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
      } else if (currentVoiceMessage) {
        speak(currentVoiceMessage);
      }
      updateVoiceButton();
    }

    function updateVoiceButton() {
      const btn = document.getElementById('voiceBtn');
      const icon = btn.querySelector('i');
      const text = document.getElementById('voice-btn-text');
      
      if (isSpeaking) {
        icon.classList.replace('fa-volume-up', 'fa-stop');
        btn.classList.replace('btn-success', 'btn-danger');
        text.textContent = "बंद करें";
      } else {
        icon.classList.replace('fa-stop', 'fa-volume-up');
        btn.classList.replace('btn-danger', 'btn-success');
        text.textContent = "अलर्ट सुनें";
      }
    }

    function saveLastData(data) {
      localStorage.setItem('lastKisanWeather', JSON.stringify(data));
    }

    function loadLastData() {
      const saved = localStorage.getItem('lastKisanWeather');
      return saved ? JSON.parse(saved) : null;
    }

    function updateUI(data) {
      // Current Weather
      document.getElementById('temperature').textContent = data.current.temperature + "°C";
      document.getElementById('weather-desc').textContent = data.current.conditionHindi || getWeatherDesc(2);
      document.getElementById('locationText').textContent = "📍 " + (data.location || "छतरपुर, मध्य प्रदेश");

      // Stats
      document.getElementById('max-temp').textContent = data.current.maxTemp + "°C";
      document.getElementById('wind-speed').textContent = data.current.windSpeed + " km/h";
      document.getElementById('humidity').textContent = data.current.humidity + "%";
      document.getElementById('rain-amount').textContent = (data.forecast[0]?.rainMm || 0) + " mm";
      document.getElementById('aqi').textContent = (data.current.aqi || 42) + " (अच्छी)";

      // Main Alert
      const alertContainer = document.getElementById('mainAlert');
      let alertHTML = '';
      let voiceText = data.voiceMessage || "मौसम जानकारी लोड हो गई है";

      if (data.alerts && data.alerts.length > 0) {
        const alert = data.alerts[0];
        const riskClass = alert.severity === "HIGH" ? "high-risk" : 
                         alert.severity === "MEDIUM" ? "medium-risk" : "low-risk";

        alertHTML = `
          <div class="alert-box ${riskClass}">
            <h5>${alert.icon} ${alert.titleHindi || alert.title}</h5>
            <p>${alert.messageHindi || alert.message}</p>
            <p class="mb-0"><strong>कार्रवाई:</strong> ${alert.actionHindi || alert.action}</p>
          </div>`;
      } else {
        alertHTML = `
          <div class="alert-box low-risk">
            <h5>✅ फसल सुरक्षित है</h5>
            <p>आज मौसम फसल के लिए अनुकूल है</p>
          </div>`;
      }

      alertContainer.innerHTML = alertHTML;
      currentVoiceMessage = voiceText;
    }

    async function getWeather() {
      const offlineBadge = document.getElementById('offline-badge-small');
      const payload = {
        latitude: 24.916,
        longitude: 79.581,
        crop: "गेहूँ",
        language: "hi"
      };

      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error("Backend error");

        const data = await response.json();
        lastWeatherData = data;
        saveLastData(data);
        updateUI(data);
        offlineBadge.classList.add('d-none');

        // Auto speak after loading
        setTimeout(() => {
          if (currentVoiceMessage) speak(currentVoiceMessage);
        }, 1000);

      } catch (error) {
        console.warn("Backend offline, using cached data");
        offlineBadge.classList.remove('d-none');

        const savedData = loadLastData();
        if (savedData) {
          updateUI(savedData);
        } else {
          // Demo fallback
          updateUI({
            current: { temperature: 36, maxTemp: 38, humidity: 45, windSpeed: 12, conditionHindi: "आंशिक बादल", aqi: 42 },
            alerts: [],
            voiceMessage: "आज छतरपुर में मौसम सामान्य है। गेहूँ की फसल के लिए अच्छा दिन है।",
            location: "छतरपुर, मध्य प्रदेश"
          });
        }
      }
    }

    window.addEventListener('online', () => document.getElementById('offline-badge-small').classList.add('d-none'));
    window.addEventListener('offline', () => document.getElementById('offline-badge-small').classList.remove('d-none'));

    window.onload = () => {
      getWeather();
    };
  </script>
</body>
</html>
