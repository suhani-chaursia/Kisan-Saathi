<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 स्मार्ट मुनाफा • किसान साथी</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #1b5e20;
      --accent: #4caf50;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      min-height: 100vh;
    }
    .glass {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }
    .voice-btn {
      width: 70px; height: 70px;
      border-radius: 50%;
      background: white;
      color: var(--primary);
      box-shadow: 0 10px 30px rgba(76,175,80,0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(76,175,80,0.6)} 70%{box-shadow:0 0 0 25px rgba(76,175,80,0)} }
    .profit-big { font-size: 3.8rem; font-weight: 700; background: linear-gradient(90deg,#2e7d32,#81c784); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="pb-5">

<div class="header bg-success text-white p-4 text-center">
  <h3><i class="fas fa-leaf"></i> किसान साथी</h3>
  <h4>💰 स्मार्ट मंडी & मुनाफा</h4>
  <span id="status" class="badge bg-light text-dark"></span>
</div>

<div class="container mt-4">

  <!-- Mandi Rates -->
  <div class="glass p-4 mb-4">
    <h5><i class="fas fa-store"></i> आज के मंडी भाव</h5>
    <div id="mandiRates" class="row g-3"></div>
  </div>

  <!-- Calculator -->
  <div class="glass p-4 mb-4">
    <h5 class="mb-3">मुनाफा कैलकुलेटर</h5>
    <div class="row g-3">
      <div class="col-6">
        <select id="crop" class="form-select">
          <option value="गेहूं">गेहूं</option>
          <option value="धान">धान</option>
          <option value="सोयाबीन">सोयाबीन</option>
        </select>
      </div>
      <div class="col-6">
        <input type="number" id="acres" value="2" class="form-control" placeholder="एकड़">
      </div>
    </div>
    <button onclick="calculateProfit()" class="btn btn-success w-100 mt-3">मुनाफा देखें</button>
  </div>

  <!-- Result -->
  <div id="result" class="glass p-4" style="display:none">
    <h4 class="text-center">अनुमानित शुद्ध मुनाफा</h4>
    <h1 id="netProfit" class="profit-big text-center"></h1>
    <div class="row text-center mt-4">
      <div class="col-4"><small>आय</small><br><strong id="revenue"></strong></div>
      <div class="col-4"><small>खर्च</small><br><strong id="cost" class="text-danger"></strong></div>
      <div class="col-4"><small>जोखिम</small><br><strong id="risk"></strong></div>
    </div>
    <div id="aiAdvice" class="alert alert-info mt-4"></div>
  </div>
</div>

<!-- Floating Voice Button -->
<button onclick="startVoice()" class="voice-btn position-fixed bottom-0 end-0 m-4 border-0">
  <i class="fas fa-microphone fa-2x"></i>
</button>

<script>
  let lastMandiData = {};

  // Replace your fetch calls with this:

async function fetchMandiRates() {
    try {
        const res = await fetch('http://127.0.0.1:8080/api/mandi', { 
            method: 'GET',
            headers: { 'Accept': 'application/json' }
        });
        
        if (!res.ok) throw new Error("API Error");
        
        const data = await res.json();
        renderMandiRates(data);
    } catch (e) {
        console.warn("Using demo mandi data");
        const demo = {
            "गेहूं": {price: 2420, change: 2.3, trend: "UP"},
            "धान": {price: 2180, change: -1.2, trend: "DOWN"},
            "सोयाबीन": {price: 4250, change: 3.8, trend: "UP"}
        };
        renderMandiRates(demo);
    }
}


function renderMandiRates(data) {
    const container = document.getElementById('mandi-rates'); // adjust ID to match your HTML
    if (!container) return;
    container.innerHTML = '';
    for (const [crop, info] of Object.entries(data)) {
        const trend = info.trend === 'UP' ? '▲' : '▼';
        const color = info.trend === 'UP' ? 'green' : 'red';
        container.innerHTML += `
            <div class="mandi-item">
                <span class="crop-name">${crop}</span>
                <span class="price">₹${info.price}/क्विंटल</span>
                <span style="color:${color}">${trend} ${info.change}%</span>
            </div>`;
    }
}

function getDemoMandiData() {
    return {
        'गेहूं':     { price: 2420, change: 2.3,  trend: 'UP'   },
        'धान':       { price: 2180, change: -1.2, trend: 'DOWN' },
        'सोयाबीन':  { price: 4250, change: 3.8,  trend: 'UP'   },
        'बाजरा':    { price: 1850, change: 0.5,  trend: 'UP'   }
    };
}


async function calculateProfit() {
    const payload = {
        crop: document.getElementById('crop').value,
        acres: parseFloat(document.getElementById('acres').value) || 2
    };

    console.log("Sending payload:", payload); // Debugging

    try {
        const res = await fetch('http://127.0.0.1:8080/api/profit', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        console.log("Response Status:", res.status);

        if (!res.ok) {
            throw new Error(`HTTP Error! Status: ${res.status}`);
        }

        const result = await res.json();
        
        // Update UI
        document.getElementById('result').style.display = 'block';
        document.getElementById('netProfit').textContent = `₹${result.netProfit.toLocaleString('en-IN')}`;
        document.getElementById('revenue').textContent = `₹${result.revenue.toLocaleString('en-IN')}`;
        document.getElementById('cost').textContent = `₹${result.totalCost.toLocaleString('en-IN')}`;
        document.getElementById('risk').textContent = `${result.riskPercentage}%`;
        document.getElementById('aiAdvice').innerHTML = `<strong>AI सलाह:</strong> ${result.aiSuggestion}`;

    } catch (error) {
        console.error("Error:", error);
        alert("❌ Backend से कनेक्ट नहीं हो पाया। डेमो मोड चला रहा हूँ...");
        
        // Demo fallback
        document.getElementById('result').style.display = 'block';
        document.getElementById('netProfit').textContent = "₹85,600";
        document.getElementById('revenue').textContent = "₹1,45,200";
        document.getElementById('cost').textContent = "₹59,600";
        document.getElementById('risk').textContent = "22%";
        document.getElementById('aiAdvice').innerHTML = "<strong>AI सलाह:</strong> गेहूं इस सीजन में अच्छा मुनाफा दे रहा है।";
    }
}

  function startVoice() {
    if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
      alert("Voice support not available");
      return;
    }
    const SpeechRecognition = window.SpeechRecognition || webkitSpeechRecognition;
    const recog = new SpeechRecognition();
    recog.lang = 'hi-IN';
    recog.onresult = (e) => {
      const text = e.results[0][0].transcript;
      console.log("Voice:", text);
      // Simple intent parsing
      if (text.includes("मुनाफा") || text.includes("profit")) {
        calculateProfit();
      }
    };
    recog.start();
  }

  window.onload = () => {
    fetchMandiRates();
  };
</script>
</body>
</html>
