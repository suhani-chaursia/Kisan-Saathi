<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>प्रोफाइल - किसान साथी</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .profile-card {
      max-width: 800px;
      margin: 40px auto;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .form-control[readonly] {
      background-color: #f8f9fa;
    }
  </style>
</head>
<body class="bg-light">

  <div class="container">
    <div class="profile-card card">
      <div class="card-header bg-success text-white py-3">
        <h4 class="mb-0">👤 मेरा प्रोफाइल</h4>
      </div>
      <div class="card-body p-4">
        
        <form id="profileForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">नाम <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="name" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">मोबाइल नंबर <span class="text-danger">*</span></label>
              <input type="tel" class="form-control" id="mobileNumber" maxlength="10" required>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">गाँव</label>
              <input type="text" class="form-control" id="village">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">जिला</label>
              <input type="text" class="form-control" id="district">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">राज्य</label>
              <input type="text" class="form-control" id="state">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">खेत का आकार (एकड़ में)</label>
<input type="number" class="form-control" id="landSize" step="0.01" placeholder="जैसे: 2.5">
            </div>
          </div>

          <button type="submit" class="btn btn-success w-100 mt-4 py-3 fs-5">
            <i class="fas fa-save"></i> प्रोफाइल अपडेट / सहेजें
          </button>
        </form>
      </div>
    </div>
  </div>

<!-- ... (baaki head aur style same rahega) ... -->

<script>
    let currentMobile = ""; 

    async function loadProfile() {
      document.getElementById('mobileNumber').value = currentMobile;
    }

    document.getElementById('profileForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      // 1. Data Object taiyar karna
      const farmerData = {
            name: document.getElementById('name').value.trim(),
            mobileNumber: document.getElementById('mobileNumber').value.trim(),
            village: document.getElementById('village').value.trim(),
            district: document.getElementById('district').value.trim(),
            state: document.getElementById('state').value.trim(),
            landSize: document.getElementById('landSize').value ? parseFloat(document.getElementById('landSize').value) : null
        };

      // 2. Validation
      if (!farmerData.mobileNumber || farmerData.mobileNumber.length !== 10) {
        alert("❌ सही मोबाइल नंबर डालें (10 अंक)");
        return;
      }

      try {
        // 3. API Call (Pura URL aur Sahi Variable name 'farmerData')
        const response = await fetch('http://localhost:8080/api/profile', { 
             method: 'POST',
             headers: {
              'Content-Type': 'application/json'
             },
             body: JSON.stringify(farmerData) // ← Pehle yahan 'formData' tha jo galat tha
        });

        if (response.ok) {
          alert("✅ प्रोफाइल सफलतापूर्वक सहेज लिया गया!");
        } else {
          // Extra detail ke liye console check karein
          const errorData = await response.text();
          console.error("Server Error:", errorData);
          alert("❌ कुछ गड़बड़ हुई: " + response.status);
        }
      } catch (err) {
        console.error("Connection Error:", err);
        alert("Server से कनेक्शन नहीं हो पा रहा। कृपया पक्का करें कि Spring Boot Run हो रहा है।");
      }
    });

    window.onload = loadProfile;
</script>
</body>
</html>
