<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌱 स्मार्ट बोआई सलाह - Kisan Saathi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Baloo+2:wght@600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --dark-green: #1b5e20;
      --med-green: #2e7d32;
      --light-green: #43a047;
    }

    body {
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1b5e20, #2e7d32);
      color: white;
      padding: 25px 15px;
      text-align: center;
      position: relative;
      border-radius: 0 0 30px 30px;
      box-shadow: 0 10px 20px rgba(27, 94, 32, 0.3);
    }

    .header h2 {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.8rem;
    }

    .voice-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .card {
      border-radius: 22px;
      box-shadow: 0 15px 35px rgba(27,94,32,0.15);
      border: none;
    }

    .form-select, .form-control {
      border-radius: 15px;
      padding: 14px 16px;
      font-size: 1.05rem;
    }

    .btn-main {
      background: linear-gradient(135deg, var(--med-green), var(--light-green));
      border: none;
      border-radius: 50px;
      padding: 16px;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .ai-loading {
      display: none;
      text-align: center;
      padding: 50px 20px;
    }
    .ai-loading.active {
      display: block;
    }

    .loader-dots span {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--light-green);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1.3); opacity: 1; }
    }

    .result-header {
      background: linear-gradient(135deg, #f8fff8, #e8f5e9);
      color: var(--dark-green);
      border-radius: 22px 22px 0 0;
      padding: 25px;
      text-align: center;
    }

    .tip-item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }
    .tip-item:last-child { border-bottom: none; }
  </style>
</head>
<body>

  <div class="header">
    <h2>🌱 स्मार्ट बोआई सलाह <span class="badge bg-warning text-dark ms-2">AI</span></h2>
    <p class="mb-0">सही समय • सही सलाह • बेहतर पैदावार</p>
    
    <button onclick="toggleSpeech()" id="voiceBtn" class="btn btn-light voice-btn">
      <i class="fas fa-volume-up fa-2x"></i>
    </button>
  </div>

  <div class="container mt-4">

    <div class="card p-4 mb-4">
      <div class="row g-3">

        <div class="col-12">
          <label class="fw-bold text-dark">🌾 फसल चुनें</label>
          <select id="crop" class="form-select form-select-lg">
            <option value="Wheat">गेहूं (Wheat)</option>
            <option value="Rice">धान (Rice)</option>
            <option value="Bajra">बाजरा (Bajra)</option>
            <option value="Soybean">सोयाबीन (Soybean)</option>
            <option value="Cotton">कपास (Cotton)</option>
            <option value="Mustard">सरसों (Mustard)</option>
            <option value="Maize">मक्का (Maize)</option>
            <option value="Gram">चना (Gram)</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="fw-bold text-dark">📍 क्षेत्र</label>
          <input type="text" id="location" value="इंदौर" class="form-control form-control-lg">
        </div>

        <div class="col-md-6">
          <label class="fw-bold text-dark">🪴 मिट्टी का प्रकार</label>
          <select id="soilType" class="form-select form-select-lg">
            <option value="Black Soil">काली मिट्टी</option>
            <option value="Red Soil">लाल मिट्टी</option>
            <option value="Sandy Soil">रेतीली मिट्टी</option>
            <option value="Clay Soil">चिकनी मिट्टी</option>
            <option value="Loamy Soil">दोमट मिट्टी</option>
          </select>
        </div>

        <!-- New: Land Acres -->
        <div class="col-12">
          <label class="fw-bold text-dark">📏 खेत का क्षेत्रफल</label>
          <div class="input-group">
            <input type="number" id="landAcres" value="2" min="0.1" step="0.1" class="form-control form-control-lg">
            <span class="input-group-text fw-bold">एकड़</span>
          </div>
        </div>

      </div>

      <button onclick="getSowingRecommendation()" id="submitBtn" 
              class="btn btn-main text-white w-100 mt-4 py-3 fw-bold">
        <i class="fas fa-seedling me-2"></i> AI बोआई सलाह लें
      </button>
    </div>

    <!-- Loading -->
    <div class="ai-loading" id="aiLoading">
      <div class="loader-dots d-flex justify-content-center">
        <span></span><span></span><span></span>
      </div>
      <h5 class="text-success fw-bold">🤖 AI आपके खेत के लिए विश्लेषण कर रहा है...</h5>
      <p class="text-muted">फसल, मिट्टी, क्षेत्रफल और मौसम का डेटा प्रोसेस हो रहा है</p>
    </div>

    <!-- Result -->
    <div id="result" class="card" style="display: none;">
      <div class="result-header">
        <h4 id="cropName" class="mb-1"></h4>
        <h1 id="bestDate" class="display-5 fw-bold mb-0"></h1>
        <p class="mb-0 mt-2">सबसे उत्तम बुवाई तारीख</p>
      </div>

      <div class="card-body p-4">
        <div class="text-center mb-4">
          <span id="riskLevel" class="badge fs-5 px-4 py-2"></span>
        </div>

        <div class="alert alert-success border-0">
          <strong>🌡 मिट्टी का तापमान:</strong> <span id="soilTemp" class="fw-bold"></span><br><br>
          <strong>🌦 मौसम की स्थिति:</strong> <span id="rainfall" class="fw-bold"></span>
        </div>

        <div class="mt-3">
          <strong class="text-success">✅ AI सलाह:</strong>
          <div id="recommendation" class="fs-5 fw-bold text-success mt-2"></div>
        </div>

        <div class="mt-4">
          <strong class="text-success">🌿 उपयोगी टिप्स:</strong>
          <div id="tips" class="mt-3"></div>
        </div>

        <button onclick="toggleSpeech()" class="btn btn-outline-success w-100 mt-4 py-3">
          <i class="fas fa-volume-up"></i> पूरी सलाह सुनें
        </button>
      </div>
    </div>
  </div>

  <script>
    let reportText = "";
    let isSpeaking = false;

    // Hindi Number Converter
    function toHindiNumber(num) {
      const hindi = ["०","१","२","३","४","५","६","७","८","९"];
      return num.toString().split('').map(d => hindi[d] || d).join('');
    }

    function cleanForVoice(text) {
      return text.replace(/✅|🌱|🌦|🪴|📍|❗|🌡/g, '')
                 .replace(/-/g, ' से ')
                 .trim();
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(cleanForVoice(text));
      utterance.lang = 'hi-IN';
      utterance.rate = 0.92;
      utterance.pitch = 1.0;
      
      utterance.onend = () => isSpeaking = false;
      window.speechSynthesis.speak(utterance);
      isSpeaking = true;
    }

    function toggleSpeech() {
      if (isSpeaking) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
      } else if (reportText) {
        speak(reportText);
      }
    }

    async function getSowingRecommendation() {
      const cropHindi = document.getElementById('crop').options[document.getElementById('crop').selectedIndex].text;
      const crop = document.getElementById('crop').value;           // English for API
      const location = document.getElementById('location').value;
      const soilType = document.getElementById('soilType').value;
      const landAcres = parseFloat(document.getElementById('landAcres').value) || 2;

      const submitBtn = document.getElementById('submitBtn');
      const loading = document.getElementById('aiLoading');
      const resultDiv = document.getElementById('result');

      submitBtn.disabled = true;
      submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> AI सोच रहा है...`;
      loading.classList.add('active');
      resultDiv.style.display = 'none';

      try {
        const response = await fetch('http://localhost:8080/api/sowing/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            crop: crop,
            location: location,
            soilType: soilType,
            landAcres: landAcres
          })
        });

        if (!response.ok) throw new Error("API से कनेक्ट नहीं हो पाया");

        const data = await response.json();

        // Fill UI
        document.getElementById('cropName').textContent = cropHindi + " बोआई";
        document.getElementById('bestDate').textContent = data.bestSowingDate;
        
        const riskEl = document.getElementById('riskLevel');
        riskEl.innerHTML = `<span class="badge bg-${data.riskColor || 'success'} fs-5">${data.riskLevel}</span>`;

        document.getElementById('soilTemp').textContent = data.soilTemperature;
        document.getElementById('rainfall').textContent = data.rainfallForecast;
        document.getElementById('recommendation').innerHTML = data.recommendation;

        // Tips
        let tipsHTML = '';
        data.tips.forEach(tip => {
          tipsHTML += `
            <div class="tip-item d-flex align-items-start">
              <span class="text-success me-3 mt-1">✅</span>
              <span>${tip}</span>
            </div>`;
        });
        document.getElementById('tips').innerHTML = tipsHTML;

        // Prepare Voice Report
        reportText = `फसल ${cropHindi} के लिए सबसे अच्छी बुवाई तारीख है ${data.bestSowingDate}। 
                      जोखिम स्तर ${data.riskLevel} है। 
                      ${data.soilTemperature}। 
                      ${data.rainfallForecast}। 
                      मुख्य सलाह: ${data.recommendation}। 
                      टिप्स: ${data.tips.join('। ')}`;

        resultDiv.style.display = 'block';

        // Auto speak
        setTimeout(() => speak(reportText), 1000);

      } catch (error) {
        console.error(error);
        alert("⚠️ Backend API से कनेक्ट नहीं हो पाया। कृपया Spring Boot सर्वर चालू करें।\n\nError: " + error.message);
      } finally {
        loading.classList.remove('active');
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="fas fa-seedling me-2"></i> नई सलाह लें`;
      }
    }

    window.onload = () => {
      // Optional: Auto fetch on load
      // getSowingRecommendation();
    };
  </script>
</body>
</html>
